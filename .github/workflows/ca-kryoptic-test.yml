name: CA with Kryoptic
# This test will perform the following operations:
# - create Kryoptic token
# - install CA with PQC certs
# - remove CA
# - remove Kryoptic token

on: workflow_call

env:
  DS_IMAGE: ${{ vars.DS_IMAGE || 'quay.io/389ds/dirsrv' }}

jobs:
  # docs/installation/ca/installing-ca-with-hsm.adoc
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SHARED: /tmp/workdir/pki
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Retrieve PKI images
        uses: actions/cache@v4
        with:
          key: pki-images-${{ github.sha }}
          path: pki-images.tar

      - name: Load PKI images
        run: docker load --input pki-images.tar

      - name: Create network
        run: docker network create example

      - name: Set up DS container
        run: |
          tests/bin/ds-create.sh \
              --image=${{ env.DS_IMAGE }} \
              --hostname=ds.example.com \
              --network=example \
              --network-alias=ds.example.com \
              --password=Secret.123 \
              ds

      - name: Set up PKI container
        run: |
          tests/bin/runner-init.sh \
              --hostname=pki.example.com \
              --network=example \
              --network-alias=pki.example.com \
              pki

          # get Fedora version
          FEDORA_VERSION=$(docker exec pki sed -n 's/^VERSION_ID=//p' /etc/os-release)
          echo "FEDORA_VERSION=$FEDORA_VERSION" >> $GITHUB_ENV

      - name: Configure crypto-policies
        if: ${{ fromJSON(env.FEDORA_VERSION) < 44 }}
        # ML-DSA algorithms for NSS are enabled as default in rawhide (Fedora 44)
        run: |
          docker exec pki sed -i \
              's/smime-key-exchange:ECDSA/smime-key-exchange:ML-DSA-65:ECDSA/' \
              /etc/crypto-policies/back-ends/nss.config

      - name: Install Kryoptic
        run: |
          # install OpenDNSSEC to ensure no conflicts
          # https://github.com/dogtagpki/pki/issues/5045
          docker exec pki dnf install -y kryoptic opensc opendnssec

          docker exec pki rpm -ql kryoptic
          docker exec pki cat /usr/share/p11-kit/modules/kryoptic.module

          # check with OpenSC
          # NOTE: the command fails if there's no token
          docker exec pki pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --show-info || true

          # check with OpenSC
          # NOTE: the command fails if there's no token
          docker exec pki pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --list-slots || true

          # check with NSS
          docker exec pki modutil -nocertdb -list

      # https://github.com/dogtagpki/pki/wiki/Kryoptic
      - name: Create Kryoptic token
        run: |
          # create password file for HSM
          echo "Secret.HSM" > password.hsm

          # configure token
          docker exec pki runuser -u pkiuser -- \
              mkdir -p /home/pkiuser/.config/kryoptic

          docker exec -i pki runuser -u pkiuser -- \
              tee /home/pkiuser/.config/kryoptic/token.conf << EOF
          [[slots]]
          slot = 1
          dbtype = "sqlite"
          dbargs = "/home/pkiuser/.config/kryoptic/token.sql"
          objects_dedup = "TrustOnly"
          EOF

          # check with OpenSC
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --list-slots

          # initialize token and SO PIN
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --label HSM \
              --so-pin $(cat password.hsm) \
              --init-token

          # initialize user PIN
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --login \
              --login-type so \
              --so-pin $(cat password.hsm) \
              --pin $(cat password.hsm) \
              --init-pin

          # check with OpenSC
          docker exec pki runuser -u pkiuser -- \
              pkcs11-tool \
              --module /usr/lib64/pkcs11/libkryoptic_pkcs11.so \
              --list-slots

          # check with NSS
          docker exec pki runuser -u pkiuser -- \
              modutil -nocertdb -list

      - name: Install CA with HSM
        run: |
          docker exec pki pkispawn \
              -f /usr/share/pki/server/examples/installation/ca-pqc.cfg \
              -s CA \
              -D pki_ds_url=ldap://ds.example.com:3389 \
              -D pki_hsm_enable=True \
              -D pki_token_name=HSM \
              -D pki_token_password=Secret.HSM \
              -D pki_server_database_password=Secret.123 \
              -D pki_ca_signing_token=HSM \
              -D pki_ocsp_signing_token=HSM \
              -D pki_audit_signing_token=HSM \
              -D pki_subsystem_token=HSM \
              -D pki_sslserver_token=HSM \
              -D pki_admin_nickname=admin \
              --debug \
              > >(tee stdout) 2> >(tee stderr >&2)

      - name: Check for warnings
        if: always()
        run: |
          sed -n '/^WARNING:/p' stderr | tee output
          diff /dev/null output

      - name: Check external commands
        if: always()
        run: |
          sed -n '/^DEBUG: Command:/p' stderr | tee output
          wc -l output

      - name: Check system certs in internal token
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              nss-cert-find \
              | tee output

          # there should be 0 certs
          echo "0" > expected
          grep "Serial Number:" output | wc -l > actual

          diff expected actual

      - name: Check system certs in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              --token HSM \
              nss-cert-find \
              | tee output

          # there should be 5 certs
          echo "5" > expected
          grep "Serial Number:" output | wc -l > actual
          diff expected actual

      - name: Check ca_signing cert in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-show \
              HSM:ca_signing \
              | tee output

          echo "CTu,Cu,Cu" > expected
          sed -n 's/\s*Trust Flags:\s*\(\S\+\)\s*$/\1/p' output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-key-find \
              --nickname HSM:ca_signing \
              | tee output

          # key type and algorithm should be ML-DSA
          cat > expected << EOF
          Type: ML-DSA-65
          Algorithm: ML-DSA
          EOF

          sed -n \
              -e 's/\s*\(Type:\s*\S\+\)\s*$/\1/p' \
              -e 's/\s*\(Algorithm:\s*\S\+\)\s*$/\1/p' \
              output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-verify \
              --cert-usage SSLCA \
              HSM:ca_signing

      - name: Check ca_ocsp_signing cert in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-show \
              HSM:ca_ocsp_signing \
              | tee output

          echo "u,u,u" > expected
          sed -n 's/\s*Trust Flags:\s*\(\S\+\)\s*$/\1/p' output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-key-find \
              --nickname HSM:ca_ocsp_signing \
              | tee output

          # key type and algorithm should be ML-DSA
          cat > expected << EOF
          Type: ML-DSA-65
          Algorithm: ML-DSA
          EOF

          sed -n \
              -e 's/\s*\(Type:\s*\S\+\)\s*$/\1/p' \
              -e 's/\s*\(Algorithm:\s*\S\+\)\s*$/\1/p' \
              output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-verify \
              --cert-usage StatusResponder \
              HSM:ca_ocsp_signing

      - name: Check ca_audit_signing cert in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-show \
              HSM:ca_audit_signing \
              | tee output

          echo "u,u,Pu" > expected
          sed -n 's/\s*Trust Flags:\s*\(\S\+\)\s*$/\1/p' output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-key-find \
              --nickname HSM:ca_audit_signing \
              | tee output

          # key type and algorithm should be ML-DSA
          cat > expected << EOF
          Type: ML-DSA-65
          Algorithm: ML-DSA
          EOF

          sed -n \
              -e 's/\s*\(Type:\s*\S\+\)\s*$/\1/p' \
              -e 's/\s*\(Algorithm:\s*\S\+\)\s*$/\1/p' \
              output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-verify \
              --cert-usage ObjectSigner \
              HSM:ca_audit_signing

      - name: Check subsystem cert in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-show \
              HSM:subsystem \
              | tee output

          echo "u,u,u" > expected
          sed -n 's/\s*Trust Flags:\s*\(\S\+\)\s*$/\1/p' output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-key-find \
              --nickname HSM:subsystem \
              | tee output

          # key type and algorithm should be ML-DSA
          cat > expected << EOF
          Type: ML-DSA-65
          Algorithm: ML-DSA
          EOF

          sed -n \
              -e 's/\s*\(Type:\s*\S\+\)\s*$/\1/p' \
              -e 's/\s*\(Algorithm:\s*\S\+\)\s*$/\1/p' \
              output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-verify \
              --cert-usage SSLClient \
              HSM:subsystem

      - name: Check sslserver cert in HSM
        run: |
          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-show \
              HSM:sslserver \
              | tee output

          echo "u,u,u" > expected
          sed -n 's/\s*Trust Flags:\s*\(\S\+\)\s*$/\1/p' output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-key-find \
              --nickname HSM:sslserver \
              | tee output

          # key type and algorithm should be ML-DSA
          cat > expected << EOF
          Type: ML-DSA-65
          Algorithm: ML-DSA
          EOF

          sed -n \
              -e 's/\s*\(Type:\s*\S\+\)\s*$/\1/p' \
              -e 's/\s*\(Algorithm:\s*\S\+\)\s*$/\1/p' \
              output > actual

          diff expected actual

          docker exec pki runuser -u pkiuser -- \
              pki \
              -d /var/lib/pki/pki-tomcat/conf/alias \
              -f /var/lib/pki/pki-tomcat/conf/password.conf \
              nss-cert-verify \
              --cert-usage SSLServer \
              HSM:sslserver

      - name: Run PKI healthcheck
        run: |
          # pki-healthcheck fails due to trust attributes issue in Kryoptic
          # https://github.com/latchset/kryoptic/issues/450
          docker exec pki runuser -u pkiuser -- \
              pki-healthcheck --failures-only || true

      - name: Check admin cert
        run: |
          docker exec pki pki-server cert-export \
              --cert-file ca_signing.crt \
              ca_signing

          docker exec pki pki nss-cert-import \
              --cert ca_signing.crt \
              --trust CT,C,C \
              ca_signing

          docker exec pki pki pkcs12-import \
              --pkcs12 /root/.dogtag/pki-tomcat/ca_admin_cert.p12 \
              --password Secret.123

          docker exec pki pki nss-key-find \
              --nickname admin \
              | tee output

          # key type and algorithm should be ML-DSA
          cat > expected << EOF
          Type: ML-DSA-65
          Algorithm: ML-DSA
          EOF

          sed -n \
              -e 's/\s*\(Type:\s*\S\+\)\s*$/\1/p' \
              -e 's/\s*\(Algorithm:\s*\S\+\)\s*$/\1/p' \
              output > actual

          diff expected actual

          docker exec pki pki nss-cert-verify \
              --cert-usage SSLClient \
              admin

          docker exec pki pki -n admin ca-user-show caadmin

      - name: Remove CA
        run: |
          docker exec pki pkidestroy \
              -s CA \
              --debug \
              > >(tee stdout) 2> >(tee stderr >&2)

      - name: Check for warnings
        if: always()
        run: |
          sed -n '/^WARNING:/p' stderr | tee output
          diff /dev/null output

      - name: Check external commands
        if: always()
        run: |
          sed -n '/^DEBUG: Command:/p' stderr | tee output
          wc -l output

      - name: Remove Kryoptic token
        run: |
          docker exec pki runuser -u pkiuser -- \
              rm -rf /home/pkiuser/.config/kryoptic

      - name: Check DS server systemd journal
        if: always()
        run: |
          docker exec ds journalctl -x --no-pager -u dirsrv@localhost.service

      - name: Check DS container logs
        if: always()
        run: |
          docker logs ds

      - name: Check PKI server systemd journal
        if: always()
        run: |
          docker exec pki journalctl -x --no-pager -u pki-tomcatd@pki-tomcat.service

      - name: Check CA debug log
        if: always()
        run: |
          docker exec pki find /var/lib/pki/pki-tomcat/logs/ca -name "debug.*" -exec cat {} \;
